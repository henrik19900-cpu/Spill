<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>Vinter-OL Spill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="errorOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);color:#ff4444;font:14px monospace;padding:20px;overflow:auto;z-index:9999;white-space:pre-wrap;"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('errorOverlay');
      el.style.display = 'block';
      el.textContent += 'ERROR: ' + msg + '\nFile: ' + src + ':' + line + '\n\n';
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('errorOverlay');
      el.style.display = 'block';
      el.textContent += 'PROMISE ERROR: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown') + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '\n\n';
    });
  </script>
  <script type="module" src="src/core/Game.js"></script>
</body>
</html>
